<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GZ PMO Portal</title>

<style>
body { font-family: Arial; margin: 20px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 8px; }
th { background: #eee; }
.card { border:1px solid #ccc; padding:15px; margin-top:20px;}
button { padding:5px 10px; margin:5px;}
</style>

</head>

<body>

<h1>📊 GZ PMO Portal</h1>

<div id="portfolio"></div>
<div id="detail"></div>

<script>

const OWNER = "RongtaiXiao";
const REPO = "GZPMO";
const TOKEN = "你的Token";

// ===== 模拟Excel数据（核心）=====
let projects = [
  {id:1, type:"C", name:"WMS 2026 Release", status:"On Track", progress:60, issue:1},
  {id:2, type:"C", name:"LIMS Enhancement", status:"On Track", progress:30, issue:2},
  {id:3, type:"I", name:"Sox audit", status:"Pending", progress:0, issue:3}
];

// ===== 只取 P / C =====
function getValidProjects() {
  return projects.filter(p => p.type === "P" || p.type === "C");
}

// ===== Portfolio =====
function renderPortfolio() {

  let data = getValidProjects();

  let html = `<h2>Portfolio（P / C only）</h2>
  <table>
    <tr>
      <th>Type</th>
      <th>Project</th>
      <th>Status</th>
      <th>Progress</th>
      <th>Action</th>
    </tr>`;

  data.forEach(p=>{
    html+=`
      <tr>
        <td>${p.type}</td>
        <td>${p.name}</td>
        <td>${getColor(p.status)}</td>
        <td>${p.progress}%</td>
        <td><button onclick="openDetail(${p.id})">Open</button></td>
      </tr>`;
  });

  html+="</table>";

  document.getElementById("portfolio").innerHTML = html;
}

// ===== Detail（PPT结构）=====
async function openDetail(id){

  let p = projects.find(x=>x.id===id);

  let comments = await getComments(p.issue);
  let last = comments.length ? comments[comments.length-1].body : "No update";

  document.getElementById("detail").innerHTML = `
  
  <div class="card">
  <h2>${p.name}</h2>

  <b>Type:</b> ${p.type}<br>
  <b>Status:</b> ${getColor(p.status)} ${p.status}<br>
  <b>Progress:</b> ${p.progress}%<br>

  <h3>📜 Last Update</h3>
  <pre>${last}</pre>

  <button onclick="showUpdate(${p.id})">✏ Update</button>

  <div id="update"></div>
  </div>
  `;
}

// ===== Update UI =====
function showUpdate(id){

  document.getElementById("update").innerHTML=`
  
  <div class="card">
  <h3>Update</h3>

  Progress: <input id="progress"><br><br>

  Status:
  <select id="status">
    <option>On Track</option>
    <option>Minor</option>
    <option>Significant</option>
  </select><br><br>

  Risks:<br>
  <textarea id="risks"></textarea><br><br>

  Actions:<br>
  <textarea id="actions"></textarea><br><br>

  <button onclick="submitUpdate(${id})">Submit</button>
  </div>
  `;
}

// ===== Submit =====
async function submitUpdate(id){

  let p = projects.find(x=>x.id===id);

  let progress = document.getElementById("progress").value;
  let status = document.getElementById("status").value;
  let risks = document.getElementById("risks").value;
  let actions = document.getElementById("actions").value;

  p.progress = progress;
  p.status = status;

  const comment = `
## PMO Update

Progress: ${progress}
Status: ${status}

Risks:
${risks}

Actions:
${actions}
`;

  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${p.issue}/comments`,{
    method:"POST",
    headers:{
      Authorization:"Bearer "+TOKEN,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({body:comment})
  });

  alert("✅ Updated");

  renderPortfolio();
}

// ===== GitHub =====
async function getComments(issue){
  let r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues/${issue}/comments`,{
    headers:{Authorization:"Bearer "+TOKEN}
  });
  return await r.json();
}

// ===== RAG =====
function getColor(s){
  if(s==="On Track") return "🟢";
  if(s==="Minor") return "🟡";
  return "🔴";
}

// init
renderPortfolio();

</script>

</body>
</html>
