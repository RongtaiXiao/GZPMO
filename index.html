<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GZ PMO Portal</title>

<style>
body { font-family: Arial; margin: 20px; }

table {
  border-collapse: collapse;
  width: 100%;
}
th, td {
  border: 1px solid #ccc;
  padding: 8px;
}
th { background: #eee; }

.container {
  border: 2px solid #333;
  padding: 15px;
}

/* PPT layout */
.section {
  margin-top: 15px;
  border: 1px solid #ccc;
  padding: 10px;
}

.row {
  display: flex;
  gap: 10px;
}

.column {
  flex: 1;
  border: 1px solid #ccc;
  padding: 10px;
}

.header {
  font-weight: bold;
  margin-bottom: 5px;
}

button {
  padding: 5px 10px;
  margin: 5px;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<h1>📊 GZ PMO Portal</h1>

<!-- ✅ Portfolio -->
<div id="portfolioPage"></div>

<!-- ✅ Detail -->
<div id="detailPage" class="hidden"></div>

<script>

// ===== 模拟Excel数据（来自你Excel结构）=====
let projects = [
  {id:1, type:"C", name:"WMS 2026 Release", status:"On Track", progress:60},
  {id:2, type:"C", name:"LIMS Enhancement", status:"On Track", progress:30},
  {id:3, type:"I", name:"Sox audit", status:"Pending", progress:0}
];

// ===== 过滤 P / C =====
function validProjects() {
  return projects.filter(p => p.type === "P" || p.type === "C");
}

// ===== 首页 =====
function renderPortfolio() {

  let html = `
  <h2>📋 Portfolio（仅 P / C）</h2>

  <table>
    <tr>
      <th>Type</th>
      <th>Project</th>
      <th>Status</th>
      <th>Progress</th>
      <th>Action</th>
    </tr>
  `;

  validProjects().forEach(p => {
    html += `
    <tr>
      <td>${p.type}</td>
      <td>${p.name}</td>
      <td>${color(p.status)}</td>
      <td>${p.progress}%</td>
      <td><button onclick="openDetail(${p.id})">Open</button></td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("portfolioPage").innerHTML = html;
}

// ===== 打开Detail =====
function openDetail(id) {

  let p = projects.find(x => x.id === id);

  document.getElementById("portfolioPage").classList.add("hidden");
  document.getElementById("detailPage").classList.remove("hidden");

  document.getElementById("detailPage").innerHTML = renderDetailHTML(p);
}

// ===== 返回 =====
function backToPortfolio() {
  document.getElementById("portfolioPage").classList.remove("hidden");
  document.getElementById("detailPage").classList.add("hidden");
}

// ===== Detail（PPT布局）=====
function renderDetailHTML(p) {

  return `
  <button onclick="backToPortfolio()">← Back</button>

  <div class="container">

    <h2>Project: ${p.name}</h2>

    <!-- Status -->
    <div class="section">
      <b>📊 Status:</b> ${color(p.status)} ${p.status}
    </div>

    <!-- Scope -->
    <div class="section">
      <div class="header">📋 Project Scope</div>
      <ul>
        <li>Scope from Excel/PPT</li>
      </ul>
    </div>

    <!-- Progress -->
    <div class="section">
      <div class="header">📈 Overall Progress</div>
      <ul>
        <li>Design: 100%</li>
        <li>Validation: ${p.progress}%</li>
        <li><b>Total: ${p.progress}%</b></li>
      </ul>
    </div>

    <!-- 中间核心（左右布局） -->
    <div class="row">

      <div class="column">
        <div class="header">🟦 Follow-up Action Plan</div>
        <ul>
          <li>Action from update</li>
        </ul>
      </div>

      <div class="column">
        <div class="header">🟥 Risks & Mitigation</div>
        <ul>
          <li>No major risk</li>
        </ul>
      </div>

    </div>

    <!-- Budget -->
    <div class="section">
      <div class="header">💰 Budget</div>
      <table>
        <tr><td>Approved</td><td>60K</td></tr>
        <tr><td>Committed</td><td>20K</td></tr>
        <tr><td>Spent</td><td>0</td></tr>
        <tr><td>Variance</td><td>0</td></tr>
      </table>
    </div>

    <!-- Timeline -->
    <div class="section">
      <div class="header">📅 Timeline</div>
      <div style="height:20px;background:#ddd;"></div>
    </div>

    <button onclick="showUpdate(${p.id})">✏ Update</button>

    <div id="updatePanel"></div>

  </div>
  `;
}

// ===== Update UI =====
function showUpdate(id) {

  document.getElementById("updatePanel").innerHTML = `
    <div class="section">

    <h3>Update</h3>

    Status:
    <select id="status">
      <option>On Track</option>
      <option>Minor</option>
      <option>Significant</option>
    </select><br><br>

    Progress:
    <input id="progress"><br><br>

    Action Plan:
    <textarea id="action"></textarea><br><br>

    Risks:
    <textarea id="risk"></textarea><br><br>

    <button onclick="submitUpdate(${id})">Submit</button>

    </div>
  `;
}

// ===== Submit =====
function submitUpdate(id) {

  let p = projects.find(x=>x.id===id);

  p.status = document.getElementById("status").value;
  p.progress = document.getElementById("progress").value;

  alert("✅ Updated");

  openDetail(id);
  renderPortfolio();
}

// ===== RAG =====
function color(s){
  if(s==="On Track") return "🟢";
  if(s==="Minor") return "🟡";
  return "🔴";
}

// init
renderPortfolio();

</script>

</body>
</html>
``
